# PowerSync Configuration
#
# Connects to local PGLite database running on host machine (bun run db:dev)

# Replication source - connects to PGLite on host machine
replication:
  connections:
    - type: postgresql
      # host.docker.internal allows Docker container to access host's localhost
      uri: postgresql://postgres:postgres@host.docker.internal:5432/postgres
      sslmode: disable

# PowerSync internal storage - uses MongoDB
storage:
  type: mongodb
  uri: mongodb://mongo:27017/powersync

# API server configuration
port: 8080

# Sync rules - defines what data syncs to which users
sync_rules:
  content: |
    bucket_definitions:
      user_data:
        parameters:
          - SELECT token_parameters.user_id AS user_id
        data:
          - SELECT id, table_name, data FROM sync_data WHERE user_id = bucket.user_id

# Client authentication (HS256 JWT)
client_auth:
  supabase: false
  jwks:
    keys:
      - kty: 'oct'
        alg: 'HS256'
        # Base64 of: powersync-dev-secret-change-in-production
        k: 'cG93ZXJzeW5jLWRldi1zZWNyZXQtY2hhbmdlLWluLXByb2R1Y3Rpb24'

telemetry:
  disable_telemetry_sharing: true
