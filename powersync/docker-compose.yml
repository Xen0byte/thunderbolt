# PowerSync Local Development Environment
#
# This Docker Compose setup runs PowerSync connecting to your local PGLite database.
# Your PGLite database should be running on localhost:5432 (bun run db:dev)
#
# Usage:
#   cd powersync
#   docker-compose up
#
# The PowerSync service will be available at http://localhost:8080

services:
  powersync:
    image: journeyapps/powersync-service:latest
    container_name: powersync
    restart: unless-stopped
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
    volumes:
      - ./config:/config
    environment:
      POWERSYNC_CONFIG_PATH: /config/config.yaml
    ports:
      - "8080:8080"
    # Allow container to access host network (for PGLite on localhost:5432)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongo:
    image: mongo:7.0
    container_name: powersync-mongo
    restart: unless-stopped
    command: --replSet rs0 --bind_ip_all --quiet
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Initialize MongoDB replica set (required by PowerSync)
  mongo-rs-init:
    image: mongo:7.0
    container_name: powersync-mongo-init
    depends_on:
      - mongo
    restart: on-failure
    entrypoint:
      - bash
      - -c
      - 'mongosh --host mongo:27017 --eval ''try{rs.status().ok && quit(0)} catch(e) {} rs.initiate({_id: "rs0", version: 1, members: [{ _id: 0, host: "mongo:27017" }]})'''

volumes:
  mongo_data:
